<!DOCTYPE html>
<html lang="fr">

  <body>
    <h1>Dashboard</h1>
    <div id="data"></div>
      
    <script>
    fetch('/dashboard/api')
      .then(res => res.json())
      .then(data => {
        document.getElementById("data").innerText =
          "Uptime: " + data.uptime;
      });
    </script>

  </body>
</html>
